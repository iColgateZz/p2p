networks:
  p2p_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

x-node-base: &node-base
  build:
    context: . # directory containing Dockerfile + source
    dockerfile: Dockerfile
  restart: unless-stopped
  networks:
    - p2p_net

services:
  # Bootstrap node
  node01:
    <<: *node-base
    container_name: p2p-node01
    hostname: node01
    environment:
      NODE_IP: "172.20.0.2"
    networks:
      p2p_net:
        ipv4_address: 172.20.0.2

  # Regular nodes
  node02:
    <<: *node-base
    container_name: p2p-node02
    hostname: node02
    environment:
      NODE_IP: "172.20.0.3"
    networks:
      p2p_net:
        ipv4_address: 172.20.0.3
    depends_on:
      - node01

  node03:
    <<: *node-base
    container_name: p2p-node03
    hostname: node03
    environment:
      NODE_IP: "172.20.0.4"
    networks:
      p2p_net:
        ipv4_address: 172.20.0.4
    depends_on:
      - node01

  node04:
    <<: *node-base
