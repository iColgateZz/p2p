<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>P2P Network Visualization</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: sans-serif;
    }
    canvas {
      border: 1px solid #444;
      background: #000;
    }
  </style>
</head>
<body>
  <h2>P2P Network</h2>
  <canvas id="canvas" width="1400" height="800"></canvas>

  <script>
    const NODES = [
      "http://127.0.0.1:5000",
    ];

    const POLL_INTERVAL_MS = 15000;
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let statuses = {};

    async function fetchStatuses() {
      for (const node of NODES) {
        try {
          const resp = await fetch(node + "/status");
          const json = await resp.json();
          statuses[node] = json;
        } catch (e) {
          console.warn("Failed to fetch", node);
          delete statuses[node];
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const nodes = Object.keys(statuses);
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const radius = 200;

      // Compute positions
      const positions = {};
      nodes.forEach((node, i) => {
        const angle = (2 * Math.PI * i) / nodes.length;
        positions[node] = {
          x: centerX + radius * Math.cos(angle),
          y: centerY + radius * Math.sin(angle),
        };
      });

      // Draw connections
      ctx.strokeStyle = "#444";
      ctx.lineWidth = 1;

      nodes.forEach(node => {
        const peers = statuses[node].known_peers || [];
        peers.forEach(peer => {
          const peerUrl = `http://${peer.ip}:${peer.port}`;
          if (positions[peerUrl]) {
            ctx.beginPath();
            ctx.moveTo(positions[node].x, positions[node].y);
            ctx.lineTo(positions[peerUrl].x, positions[peerUrl].y);
            ctx.stroke();
          }
        });
      });

      // Draw nodes
      nodes.forEach(node => {
        const { x, y } = positions[node];
        const status = statuses[node];

        ctx.beginPath();
        ctx.arc(x, y, 20, 0, 2 * Math.PI);
        ctx.fillStyle = "#2ecc71";
        ctx.fill();

        ctx.fillStyle = "#fff";
        ctx.font = "12px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(
          `${status.block_height}`,
          x,
          y + 4
        );

        ctx.fillText(
          node.replace("http://", ""),
          x,
          y + 38
        );
      });
    }

    async function update() {
      await fetchStatuses();
      draw();
    }

    update();
    setInterval(update, POLL_INTERVAL_MS);
  </script>
</body>
</html>
